<style>
:root {
  --bg:          #060B14;
  --bg2:         #0C1525;
  --bg3:         #111E33;
  --border:      rgba(180,140,60,0.18);
  --border2:     rgba(180,140,60,0.35);
  --gold:        #C9A84C;
  --gold2:       #E8C96A;
  --gold-dim:    rgba(201,168,76,0.12);
  --blue:        #1B3A6B;
  --blue-light:  #2E5EA8;
  --text:        #E8EFF8;
  --text-muted:  #6A8FAA;
  --text-dim:    #3A5A7A;
  --success:     #27AE60;
  --success-bg:  rgba(39,174,96,0.1);
  --warning:     #E67E22;
  --warning-bg:  rgba(230,126,34,0.1);
  --danger:      #E74C3C;
  --danger-bg:   rgba(231,76,60,0.1);
  --radius:      10px;
  --shadow:      0 4px 24px rgba(0,0,0,0.4);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Animated background grid ── */
body::before {
  content:'';
  position:fixed; inset:0; z-index:0;
  background-image:
    linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events:none;
}

/* ════════════════════════════
   LOGIN SCREEN
════════════════════════════ */
#loginScreen {
  position:fixed; inset:0; z-index:100;
  display:flex; align-items:center; justify-content:center;
  background: radial-gradient(ellipse at center, #0D1E3A 0%, #060B14 70%);
}

.login-card {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 16px;
  padding: 48px 44px;
  width: 100%; max-width: 420px;
  box-shadow: 0 0 60px rgba(201,168,76,0.08), var(--shadow);
  text-align: center;
  position: relative;
  overflow: hidden;
}

.login-card::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

.login-logo {
  margin-bottom: 28px;
}

.login-logo svg {
  filter: drop-shadow(0 0 12px rgba(201,168,76,0.4));
}

.login-title {
  font-family: 'Cinzel', serif;
  font-size: 26px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 3px;
  margin-bottom: 4px;
}

.login-title span { color: var(--gold); }

.login-sub {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 32px;
}

.login-label {
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.login-input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 12px 16px;
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  font-size: 15px;
  margin-bottom: 16px;
  transition: border-color 0.2s;
}

.login-input:focus {
  outline: none;
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
}

.login-btn {
  width: 100%;
  background: linear-gradient(135deg, var(--gold) 0%, #A07830 100%);
  border: none;
  border-radius: 8px;
  padding: 14px;
  color: #060B14;
  font-family: 'Cinzel', serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 2px;
  cursor: pointer;
  margin-top: 8px;
  transition: opacity 0.2s, transform 0.1s;
}

.login-btn:hover { opacity: 0.9; }
.login-btn:active { transform: scale(0.99); }

.login-error {
  background: var(--danger-bg);
  border: 1px solid var(--danger);
  border-radius: 8px;
  padding: 10px 14px;
  color: var(--danger);
  font-size: 13px;
  margin-top: 12px;
  display: none;
}

.login-restricted {
  margin-top: 20px;
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 1px;
}

/* ════════════════════════════
   APP SHELL
════════════════════════════ */
#appShell { display:none; min-height:100vh; position:relative; z-index:1; }

/* ── Header ── */
.top-bar {
  position: sticky; top: 0; z-index: 50;
  background: rgba(6,11,20,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  height: 58px;
  display: flex; align-items: center; justify-content: space-between;
}

.top-bar-left {
  display: flex; align-items: center; gap: 14px;
}

.top-bar-logo {
  display: flex; align-items: center; gap: 10px;
}

.logo-mark {
  width: 32px; height: 32px;
}

.top-bar-title {
  font-family: 'Cinzel', serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 2px;
}

.top-bar-title span { color: var(--gold); }

.top-bar-badge {
  background: var(--gold-dim);
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 2px 8px;
  font-size: 10px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.top-bar-right {
  display: flex; align-items: center; gap: 16px;
}

.top-bar-user {
  font-size: 13px;
  color: var(--text-muted);
}

.top-bar-user span { color: var(--text); font-weight: 600; }

.btn-logout {
  background: none;
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 6px 14px;
  color: var(--text-muted);
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-logout:hover { border-color: var(--danger); color: var(--danger); }

/* ── Main layout ── */
.main-layout {
  display: flex;
  min-height: calc(100vh - 58px);
}

/* ── Sidebar ── */
.sidebar {
  width: 220px;
  flex-shrink: 0;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  padding: 20px 0;
  position: sticky;
  top: 58px;
  height: calc(100vh - 58px);
  overflow-y: auto;
}

.sidebar-section {
  padding: 0 16px;
  margin-bottom: 6px;
}

.sidebar-label {
  font-size: 9px;
  font-weight: 700;
  color: var(--text-dim);
  letter-spacing: 2.5px;
  text-transform: uppercase;
  padding: 14px 12px 6px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-muted);
  transition: all 0.15s;
  margin-bottom: 2px;
}

.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: var(--gold-dim); color: var(--gold); border: 1px solid var(--border2); }
.nav-item .nav-icon { font-size: 16px; width: 20px; text-align: center; }

/* ── Content ── */
.content {
  flex: 1;
  padding: 28px;
  overflow-y: auto;
}

/* ── Stat cards ── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 28px;
}

.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 22px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s;
}

.stat-card:hover { border-color: var(--border2); }

.stat-card::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0.5;
}

.stat-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.stat-value {
  font-family: 'Cinzel', serif;
  font-size: 36px;
  font-weight: 700;
  color: var(--gold);
  line-height: 1;
  margin-bottom: 4px;
}

.stat-sub {
  font-size: 12px;
  color: var(--text-dim);
}

/* ── Section headers ── */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.section-title {
  font-family: 'Cinzel', serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-title::before {
  content:'';
  width: 3px; height: 16px;
  background: var(--gold);
  border-radius: 2px;
}

/* ── Hotel cards ── */
.hotels-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 16px;
}

.hotel-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: all 0.2s;
  cursor: pointer;
}

.hotel-card:hover {
  border-color: var(--border2);
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

.hotel-card-header {
  padding: 16px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}

.hotel-avatar {
  width: 42px; height: 42px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--blue) 0%, var(--blue-light) 100%);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cinzel', serif;
  font-size: 16px;
  font-weight: 700;
  color: white;
  flex-shrink: 0;
}

.hotel-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 2px;
}

.hotel-id {
  font-size: 11px;
  color: var(--text-dim);
  font-family: monospace;
}

.hotel-status {
  margin-left: auto;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  flex-shrink: 0;
}

.status-active { background: var(--success-bg); color: var(--success); border: 1px solid rgba(39,174,96,0.3); }
.status-idle   { background: var(--warning-bg); color: var(--warning); border: 1px solid rgba(230,126,34,0.3); }
.status-new    { background: var(--gold-dim);   color: var(--gold);    border: 1px solid var(--border2); }

.hotel-card-body {
  padding: 14px 18px;
}

.hotel-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 12px;
}

.hotel-stat {
  text-align: center;
  padding: 8px 4px;
  background: var(--bg3);
  border-radius: 6px;
  border: 1px solid var(--border);
}

.hotel-stat-val {
  font-family: 'Cinzel', serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--gold);
}

.hotel-stat-lbl {
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-top: 2px;
}

.hotel-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 11px;
  color: var(--text-dim);
}

.hotel-card-actions {
  padding: 12px 18px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
}

.btn-sm {
  flex: 1;
  padding: 8px 12px;
  border-radius: 6px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
  border: none;
}

.btn-gold {
  background: var(--gold-dim);
  color: var(--gold);
  border: 1px solid var(--border2);
}

.btn-gold:hover { background: var(--gold); color: var(--bg); }

.btn-ghost {
  background: var(--bg3);
  color: var(--text-muted);
  border: 1px solid var(--border);
}

.btn-ghost:hover { border-color: var(--border2); color: var(--text); }

.btn-danger {
  background: var(--danger-bg);
  color: var(--danger);
  border: 1px solid rgba(231,76,60,0.3);
}

.btn-danger:hover { background: var(--danger); color: white; }

/* ── Table ── */
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

.data-table th {
  text-align: left;
  padding: 10px 14px;
  font-size: 9px;
  font-weight: 700;
  color: var(--text-dim);
  letter-spacing: 2px;
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
}

.data-table td {
  padding: 12px 14px;
  border-bottom: 1px solid rgba(180,140,60,0.06);
  color: var(--text);
  vertical-align: middle;
}

.data-table tr:hover td { background: var(--bg3); }

/* ── Activity log ── */
.log-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}

.log-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  margin-top: 5px;
  flex-shrink: 0;
}

.log-text { font-size: 13px; color: var(--text); line-height: 1.4; }
.log-time { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.7);
  display: none;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}

.modal-overlay.open { display: flex; }

.modal-box {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 14px;
  width: 100%; max-width: 560px;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: 0 0 60px rgba(0,0,0,0.5);
  position: relative;
}

.modal-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.modal-title {
  font-family: 'Cinzel', serif;
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 1px;
}

.modal-close {
  background: none; border: none;
  color: var(--text-muted); cursor: pointer;
  font-size: 20px; line-height: 1;
  transition: color 0.15s;
}

.modal-close:hover { color: var(--text); }

.modal-body { padding: 20px 24px; }

.modal-footer {
  padding: 14px 24px;
  border-top: 1px solid var(--border);
  display: flex; gap: 10px; justify-content: flex-end;
}

.info-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}

.info-row:last-child { border-bottom: none; }
.info-label { color: var(--text-muted); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; }
.info-val { color: var(--text); font-weight: 600; }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 28px; right: 28px; z-index: 500;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 14px 20px;
  font-size: 14px;
  color: var(--text);
  box-shadow: var(--shadow);
  transform: translateY(80px);
  opacity: 0;
  transition: all 0.3s;
  max-width: 340px;
}

.toast.show { transform: translateY(0); opacity: 1; }

/* ── Loading ── */
.spin {
  width: 20px; height: 20px;
  border: 2px solid rgba(201,168,76,0.2);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: inline-block;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}

.loading-state .spin { width: 32px; height: 32px; border-width: 3px; margin: 0 auto 14px; display: block; }

/* ── Empty state ── */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
}

.empty-state-icon { font-size: 40px; margin-bottom: 12px; }
.empty-state-text { font-size: 14px; }

/* ── Access banner ── */
.access-banner {
  background: linear-gradient(135deg, rgba(201,168,76,0.08) 0%, rgba(27,58,107,0.2) 100%);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;

<script>
// ════════════════════════════════════════

const firebaseConfig = {

});

async function doAdminLogin() {
  const email = document.getElementById('li_email').value.trim();
  const pass  = document.getElementById('li_pass').value;
  const err   = document.getElementById('loginError');

  if(!email || !pass) { showLoginError('Introduce email y contraseña'); return; }

}

function showLoginError(msg) {

// ════════════════════════════════════════
// LOAD ALL DATA
// ════════════════════════════════════════
async function loadAllData() {
  try {
    // Cargar todos los hoteles
    const hotelsSnap = await db.collection('hotels').get();
    allHotels = hotelsSnap.docs.map(d => ({ id: d.id, ...d.data() }));

    // Cargar todos los usuarios
    const usersSnap = await db.collection('users').get();
    allUsers = usersSnap.docs.map(d => ({ uid: d.id, ...d.data() }));

    console.log(`✅ ${allHotels.length} hoteles | ${allUsers.length} usuarios`);
  } catch(e) {
    console.error('Error cargando datos:', e.message);
    showToast('⚠️ Error al cargar datos: ' + e.message);
  }
}

async function refreshData() {
  showToast('🔄 Actualizando datos...');
  await loadAllData();
  showModule(currentModule);
  showToast('✅ Datos actualizados');
}

// ════════════════════════════════════════
// NAVIGATION
// ════════════════════════════════════════
let currentModule = 'dashboard';

function showModule(mod) {
  currentModule = mod;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav_' + mod);
  if(navEl) navEl.classList.add('active');

  const mc = document.getElementById('mainContent');
  if(mod === 'dashboard') renderDashboard(mc);
  else if(mod === 'hoteles') renderHoteles(mc);
  else if(mod === 'usuarios') renderUsuarios(mc);
  else if(mod === 'actividad') renderActividad(mc);
  else if(mod === 'ordenes') renderOrdenes(mc);
  else if(mod === 'acceso') renderAcceso(mc);
}

// ════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════
function getHotelUsers(hotelId) {
  return allUsers.filter(u => u.hotelId === hotelId);
}

function getHotelStatus(hotel) {
  // Hotel activo si tiene usuarios, departamentos o piscinas configuradas
  const users = getHotelUsers(hotel.id);
  const tieneUsuarios = users.length > 0;
  const tieneDepartamentos = (hotel.departamentos||[]).length > 0;
  const tienePiscinas = (hotel.piscinas||[]).length > 0;
  const tieneHabs = (hotel.plantas || hotel.totalHabs) > 0;

  if(tieneUsuarios || tieneDepartamentos || tienePiscinas || tieneHabs) return 'active';

  // Si fue creado hace menos de 7 días sin datos = nuevo
  const creado = hotel.fechaCreacion?.toDate ? hotel.fechaCreacion.toDate() : new Date(hotel.fechaCreacion || 0);
  const diffDays = (Date.now() - creado.getTime()) / 86400000;
  if(diffDays < 7) return 'new';

  return 'idle';
}

function formatDate(ts) {
  if(!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('es-ES', { day:'2-digit', month:'short', year:'numeric' });
}

function formatTime(ts) {
  if(!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleString('es-ES', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
}

function getInitials(nombre) {
  return (nombre||'??').split(' ').filter(Boolean).map(n=>n[0]).join('').slice(0,2).toUpperCase();
}

function hotelInitials(nombre) {
  return (nombre||'H').split(' ').filter(Boolean).map(n=>n[0]).join('').slice(0,2).toUpperCase();
}

// ════════════════════════════════════════
// HOTELES
// ════════════════════════════════════════
function renderHotelCard(h) {
  const users = getHotelUsers(h.id);
  const status = getHotelStatus(h);
  const statusLabel = status === 'active' ? 'Activo' : status === 'new' ? 'Nuevo' : 'Sin actividad';
  const statusClass = status === 'active' ? 'status-active' : status === 'new' ? 'status-new' : 'status-idle';

  return `
  <div class="hotel-card" onclick="verDetalleHotel('${h.id}')">
    <div class="hotel-card-header">
      <div class="hotel-avatar">${hotelInitials(h.nombre)}</div>
      <div>
        <div class="hotel-name">${h.nombre||'Sin nombre'}</div>
        <div class="hotel-id">${h.id}</div>
      </div>
      <span class="hotel-status ${statusClass}">${statusLabel}</span>
    </div>
    <div class="hotel-card-body">
      <div class="hotel-stats">
        <div class="hotel-stat">
          <div class="hotel-stat-val">${users.length}</div>
          <div class="hotel-stat-lbl">Usuarios</div>
        </div>
        <div class="hotel-stat">
          <div class="hotel-stat-val">${h.piscinas?.length||0}</div>
          <div class="hotel-stat-lbl">Piscinas</div>
        </div>
        <div class="hotel-stat">
          <div class="hotel-stat-val">${Object.keys(h.habitaciones||{}).length||h.totalHabs||'—'}</div>
          <div class="hotel-stat-lbl">Habs.</div>
        </div>
      </div>
      <div class="hotel-meta">
        <span>📅 Creado: ${formatDate(h.fechaCreacion)}</span>
        <span>${h.setupDone?'✅ Setup completo':'⏳ En configuración'}</span>
      </div>
    </div>
    <div class="hotel-card-actions" onclick="event.stopPropagation()">
      <button class="btn-sm btn-gold" onclick="verDetalleHotel('${h.id}')">🔍 Ver detalle</button>
      <button class="btn-sm btn-ghost" onclick="accederHotel('${h.id}','${(h.nombre||'').replace(/'/g,'')}')">🚪 Acceder</button>
    </div>
  </div>`;
}

        </div>
      </div>

        <div style="font-size:10px;font-weight:700;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">Información</div>
        <div class="info-row"><span class="info-label">ID Firebase</span><span class="info-val" style="font-family:monospace;font-size:12px">${hotel.id}</span></div>
        <div class="info-row"><span class="info-label">Código acceso</span><span class="info-val">${hotel.codigoAcceso||'—'}</span></div>

async function renderActividad(mc) {

async function renderOrdenes(mc) {
  mc.innerHTML = `
    <div style="margin-bottom:24px">

        <div class="stat-card">
          <div class="stat-label">En curso</div>
          <div class="stat-value" style="color:var(--warning)">${enCurso.length}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Completadas</div>
          <div class="stat-value" style="color:var(--success)">${completadas.length}</div>
        </div>
      </div>

      ${[...enCurso,...pendientes].length === 0 ? `
        <div class="empty-state">
          <div class="empty-state-icon">🔔</div>
          <div class="empty-state-text">No hay órdenes activas</div>
        </div>` : `

        <table class="data-table">
          <thead><tr><th>Orden</th><th>Hotel</th><th>Prioridad</th><th>Estado</th></tr></thead>
          <tbody>
            ${[...enCurso,...pendientes].map(o=>`
              <tr>
                <td>
                  <div style="font-weight:600">${o.titulo||o.descripcion||'Sin título'}</div>
                  <div style="font-size:11px;color:var(--text-dim)">${o.ubicacion||''}</div>
                </td>
                <td style="color:var(--text-muted)">${o._hotelNombre||'—'}</td>
                <td><span style="padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;background:${o.prioridad==='urgente'?'var(--danger-bg)':'var(--warning-bg)'};color:${o.prioridad==='urgente'?'var(--danger)':'var(--warning)'}">${o.prioridad||'normal'}</span></td>
                <td><span style="padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;background:${o.status==='in_progress'?'var(--warning-bg)':'var(--gold-dim)'};color:${o.status==='in_progress'?'var(--warning)':'var(--gold)'}">${o.status||'pending'}</span></td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`}`;
  } catch(e) {
    mc.innerHTML += `<div style="color:var(--danger);padding:20px">❌ Error: ${e.message}</div>`;
  }
}

function copiar(texto) {

}

}

function closeMainModal() {
  document.getElementById('mainModal').classList.remove('open');
}

document.getElementById('mainModal').addEventListener('click', function(e) {
  if(e.target === this) closeMainModal();
});

// ════════════════════════════════════════
// TOAST
// ════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
